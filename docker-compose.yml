services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    restart: always
    environment:
      POSTGRES_DB: atmr_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testagent2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.10-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-300}
        PIP_RETRIES: ${PIP_RETRIES:-10}
        REQUIREMENTS_FILE: ${REQUIREMENTS_FILE:-requirements_full.txt}
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-testagent2026}@db:5432/atmr_db
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-random-string-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
